# -- Theme Configuration for Koralyte --
[module]
  [module.hugoVersion]
    extended = true
    min = '0.146.0'

defaultContentLanguage = 'en'
enableRobotsTXT = true
summaryLength = 0
enableEmoji = true

[pagination]
  pagerSize = 100

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = 'tags'

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[related]
  threshold = 0
  toLower = false

  [[related.indices]]
    name = 'tags'
    weight = 100

[goldmark]
  [goldmark.parser]
    wrapStandAloneImageWithinParagraph = false

    [goldmark.parser.attribute]
      block = true

  [goldmark.renderer]
    unsafe = true

  [goldmark.extensions]
    [goldmark.extensions.passthrough]
      enable = true
      [goldmark.extensions.passthrough.delimiters]
        block = [['\\[', '\\]'], ['$$', '$$']]
        inline = [['\\(', '\\)']]

[highlight]
  noClasses = false

[tableOfContents]
  startLevel = 2
  endLevel = 4

[params]
  colorScheme = 'koralyte'
  defaultAppearance = 'light'
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = false
  disableImageOptimization = false
  disableImageZoom = false
  disableTextInHeader = false
  fingerprintAlgorithm = 'sha512'
  mainSections = ['posts']

  [params.footer]
    showMenu = true
    showCopyright = true
    showThemeAttribution = true
    showAppearanceSwitcher = true
    showScrollToTop = true

  [params.homepage]
    showRecent = false
    showRecentItems = 5
    showMoreLink = false
    showMoreLinkDest = '/posts/'

  [params.article]
    showDate = true
    showDateUpdated = false
    showAuthor = true
    showDraftLabel = true
    showHeadingAnchors = true
    showPagination = true
    invertPagination = false
    showReadingTime = true
    showTableOfContents = false
    showTaxonomies = false
    showRelatedContent = false
    relatedContentLimit = 3
    externalLinkForceNewTab = true

  [params.list]
    showSummary = false
    showCards = false

  [params.sitemap]
    excludedKinds = ['taxonomy', 'term']

  [params.taxonomy]
    showTermCount = true
